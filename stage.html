    <main class="max-w-4xl mx-auto px-4 py-8">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">

            </div>
            <div class="bg-slate-800 p-6 rounded-2xl border border-yellow-500/50">
                <h2 class="text-yellow-400 font-bold mb-2 text-sm uppercase">次の公演</h2>
                <div id="next-stage" class="text-lg">公演はありません</div>
            </div>
        </div>

        <div id="timetable-section" class="mb-16">
            <h2 class="text-2xl font-bold mb-6 text-center">本日のタイムテーブル</h2>
            <div id="timetable" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>

        <h2 class="text-2xl font-bold mb-8 text-center">出演団体紹介</h2>
        <div id="profileArea" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    <script type="module">

        import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        window.toggleMenu = () => { document.getElementById("menu").classList.toggle("hidden"); };

        const firebaseConfig = { databaseURL: "https://nankousai2026-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const stages = {
            "7/4": [
                { name: "吹奏楽部", type: "吹奏楽", start: "10:10", end: "10:25", catch: "今年もナツいアツを吹奏楽部が盛り上げます！名曲揃いのステージ、とくとご覧あれ！", image: "", url: "https://www.instagram.com/satsunan_wind?igsh=MWRxNjVvNWZrdWk0Yg%3D%3D&utm_source=qr" },
                { name: "Joynvolve", type: "バンド", start: "10:35", end: "10:50", catch: "ベテランです。キタニタツヤ、Vaundyなどを演奏します！ラストステージ、是非ご覧ください！", image: "", url: "https://www.instagram.com/joyn_volve?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" },
                { name: "Icy Drop", type: "バンド", start: "11:00", end: "11:15", catch: "三年生4人組バンドです！PUFFYやヨルシカ、あいみょんを演奏します。ぜひ来てください！", image: "", url: "https://www.instagram.com/icy__drop/?utm_source=ig_web_button_share_sheet" },
                { name: "1st", type: "ダンス", start: "11:25", end: "11:40", catch: "1・2年生総勢41名で挑むダンスパフォーマンス！全員の全力、ぜひ見に来てください！", image: "", url: "https://www.instagram.com/satsunan_dance?igsh=NHgzOTRhcjNndmFp" },
                { name: "モノノAw@rE", type: "バンド", start: "11:50", end: "12:05", catch: "2026ラストライブ。震えるほど叫べ、モノノaw@rE。", image: "", url: "https://www.instagram.com/mnn_awr?igsh=a3l6bHF6MXhlYnVh&utm_source=qr" },
                { name: "クイ研バンド", type: "バンド", start: "12:15", end: "12:30", catch: "問題、東京事変のデビューシン　ドラマ「若者のすべて」の主題黒いソファーが動き回る", url: "https://www.instagram.com/hinano_channu_jst/?utm_source=ig_web_button_share_sheet" },
                { name: "Stylish Delay", type: "バンド", start: "12:40", end: "12:55", catch: "一遅刻去ってまた一遅刻!?遅れて始まってもそれがStylish！※遅れないように善処します。", image: "", url: "https://www.instagram.com/stylish_delay?igsh=aWs1dWZrbHdvMHgx" },
                { name: "miniLiFE!", type: "ダンス", start: "13:05", end: "13:20", catch: "『私と貴方で作る、札南ライフ！』", image: "", url: "https://www.instagram.com/idol.life_mnm?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" },
                { name: "Purple Apple", type: "バンド", start: "13:30", end: "13:45", catch: "「恥ずかしい青春は」「残響散歌」等演奏します‼一緒に盛り上がりましょう！！ぜひ来て下さい！", url: "https://www.instagram.com/pur.aple?igsh=MWxqcXprN25yNGJ0cw==" },
                { name: "縄文土器づくり", type: "劇", start: "13:55", end: "14:10", catch: "縄文人と君が魂を燃やす熱狂のステージ。時を超えて胸踊る、伝説の土器作りが今始まる。", image: "jomon.jpeg", url: "https://www.instagram.com/jomon.2026?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" },
                { name: "Pascal", type: "バンド", start: "14:20", end: "14:35", catch: "3年ガールズバンドです！ミスチル、SHISHAMO、HumpBackで熱く盛り上げます！", image: "", url: "https://www.instagram.com/band.pascal?igsh=cGwwYjB3NWhxZ254" }
            ],
            "7/5": [
                { name: "Prisma", type: "バンド", start: "9:40", end: "9:55", catch: "3年生4人バンドによる最初で最後のライブ！色とりどりな演奏をとくとご覧あれ", image: "", url: "https://www.instagram.com/pri_sma3/?utm_source=ig_web_button_share_sheet" },
                { name: "日常ヴィンテージ", type: "バンド", start: "10:05", end: "10:20", catch: "魁！！", image: "", url: "https://www.instagram.com/nichi_vin/?utm_source=ig_web_button_share_sheet" },
                { name: "mila.", type: "バンド", start: "10:30", end: "10:45", catch: "第78期ピースロックバンドmila. I SWEAR I RESPECT THE HERO!!", image: "mila.jpeg", url: "https://www.instagram.com/mila.band_?igsh=MTJ2OTlscGwwemkwcQ%3D%3D&utm_source=qr" },
                { name: "TOYA", type: "ボイパ", start: "10:55", end: "11:10", catch: "ストリートに続き、ステージでもビートボックスパフォーマンスを行います！是非来てください！", image: "", url: "https://www.instagram.com/toya_bunkasai?igsh=aHdpMzhzNDlrdmV4" },
                { name: "神楽", type: "ダンス", start: "11:25", end: "11:40", catch: "ダンス部2・3年生による大迫力のパフォーマンス。皆さんの心を動かすステージをお届けします！", image: "kagura.jpeg", url: "https://www.instagram.com/satsunan_dance?igsh=NHgzOTRhcjNndmFp" },
                { name: "仲間を得た中尾", type: "バンド", start: "11:55", end: "12:10", catch: "中尾が仲間を得てから1年。仲間の1人がついに卒業します。最後の勇姿をぜひ見に来てください！", image: "", url: "https://www.instagram.com/nakama__eta?utm_source=ig_web_button_share_sheet&igsh=ZDNlZDc0MzIxNw==" },
                { name: "レノ", type: "バンド", start: "12:20", end: "12:35", catch: "4Pロックバンド、ラストライブ。King Gnu、SHISHAMO…", image: "reno.jpeg", url: "https://www.instagram.com/reno.7708?igsh=amdremxhczM4ZHc0&utm_source=qr" },
                { name: "ササキーズ", type: "バンド", start: "12:45", end: "13:00", catch: "全国の佐々木を代表してお送りします。曲はスピッツ、ニルヴァーナ、サピロウズ、ブランデー戦紀", image: "", url: "https://www.instagram.com/sasaki_den_sasaki?igsh=NjA5c2Mzb3N1dzN6&utm_source=qr" }
            ]
        };

        function timeToMinutes(time) {
            const [h, m] = time.split(":").map(Number);
            return (h * 60) + m;
        }

        function updateStage() {
            const now = new Date();
            const today = `${now.getMonth() + 1}/${now.getDate()}`;
            const todayStages = stages[today];
            if (!todayStages) return;
            const curMin = now.getHours() * 60 + now.getMinutes();
            let current = "公演はありません", next = "本日の公演終了";
            for (let i = 0; i < todayStages.length; i++) {
                const s = todayStages[i];
                if (curMin >= timeToMinutes(s.start) && curMin < timeToMinutes(s.end)) {
                    current = `${s.name}`;
                    if (todayStages[i+1]) next = `${todayStages[i+1].name}`;
                    break;
                } else if (curMin < timeToMinutes(s.start)) {
                    next = `${s.name}`;
                    break;
                }
            }
            document.getElementById("now-stage").innerText = current;
            document.getElementById("next-stage").innerText = next;
        }

        function init() {
            const today = `${new Date().getMonth() + 1}/${new Date().getDate()}`;
            const todayStages = stages[today] || [];
            document.getElementById("timetable").innerHTML = todayStages.map(s => `
                <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
                    <div class="text-yellow-300 font-bold text-sm">${s.start} - ${s.end}</div>
                    <div class="font-bold">${s.name}</div>
                </div>`).join('');

            let profileHtml = "";
            for (const day in stages) {
                stages[day].forEach(s => {
                    const imgHtml = s.image ? `<img src="${s.image}" alt="${s.name}" class="w-full h-40 object-cover bg-slate-900" onerror="this.parentElement.style.display='none'">` : '';
                    
                    profileHtml += `
                        <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-lg border border-slate-700 flex flex-col h-full hover:border-blue-500 transition-colors">
                            ${imgHtml}
                            <div class="p-4 flex flex-col flex-grow">
                                <span class="text-xs text-blue-400 font-bold mb-1">${day} ${s.start}-${s.end}</span>
                                <h3 class="font-bold text-lg mb-2">${s.name}</h3>
                                <p class="text-sm text-slate-400 mb-4 flex-grow">${s.catch}</p>
                                ${s.url ? `<a href="${s.url}" target="_blank" class="text-blue-400 text-sm font-bold hover:underline">Instagramを見る</a>` : ''}
                            </div>
                        </div>`;
                });
            }
            document.getElementById("profileArea").innerHTML = profileHtml;
            updateStage();
        }
        init();
        setInterval(updateStage, 60000);
    </script>
</body>
</html>
