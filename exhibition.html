            { name:"よろずや同好会", category:"部活動", grade:"部活動", room:"5F6", summary:"ボランティアの力でつながる、よろずや☓元気ショップ！活動に参加してクッキーをGETしよう！", image:"5F6 よろずや同好会.jpg", url:"https://sassaren.or.jp/genki/" },
            { name:"メイドの土産101", category:"飲食店", grade:"1年生", room:"5F7", summary:"おいしいお食事と可愛いメイドが御主人様を冥土にお連れします♡", image:"5f7 101 メイドの土産101.jpg", url:"https://www.instagram.com/satsunan79_101" },
            { name:"記鐿(きろく/きおく)(302)", category:"お化け屋敷", grade:"3年生", room:"5F8", summary:"無惨に殺された幼馴染。真紅に染まった事故現場。残された抵抗の痕。今甦るあの日の記鐿。", image:"5F8-5B 302 記憶記録.JPG", url:"https://www.instagram.com/krmt77302" }
        ];

        let activeFilters = [];
        const filterCategories = ["アトラクション", "飲食店", "お化け屋敷", "部活動", "1年生", "2年生", "3年生"];

        function toggleMenu() { document.getElementById("menu").classList.toggle("hidden"); }

        const filterArea = document.getElementById("filterArea");
        filterCategories.forEach(cat => {
            const btn = document.createElement("button");
            btn.className = "filter-btn px-4 py-2 rounded-full border border-slate-700 bg-slate-800 hover:bg-slate-700 transition text-sm";
            btn.innerText = cat;
            btn.onclick = () => {
                if (activeFilters.includes(cat)) { activeFilters = activeFilters.filter(i => i !== cat); btn.classList.remove("active"); }
                else { activeFilters.push(cat); btn.classList.add("active"); }
                createCards();
            };
            filterArea.appendChild(btn);
        });

        function createCards() {
            const keyword = document.getElementById("search").value.toLowerCase();
            const filtered = exhibitions.filter(item => {
                const matchKeyword = item.name.toLowerCase().includes(keyword) || item.summary.toLowerCase().includes(keyword);
                const matchFilter = activeFilters.length === 0 || activeFilters.some(f => item.category === f || item.grade === f);
                return matchKeyword && matchFilter;
            });

            document.getElementById("cardArea").innerHTML = filtered.map(item => {
                let linkText = "詳しくはこちら";
                if (item.url.includes("instagram.com")) {
                    linkText = "Instagramはこちら";
                } else if (item.url.includes("x.com") || item.url.includes("twitter.com")) {
                    linkText = "X(旧ツイッター)はこちら";
                }
                
                return `
                <div class="bg-slate-800 rounded-2xl overflow-hidden shadow-lg border border-slate-700 flex flex-col h-full hover:border-blue-500 transition-colors">
                    <img
    src="${item.image}"
    loading="lazy"
    decoding="async"
    alt="${item.name}"
    class="w-full h-40 object-contain bg-slate-900"
    onerror="this.src='https://placehold.jp/400x200.png?text=画像なし'">
                    <div class="p-4 border-b border-slate-700 flex items-center gap-2">
                        <span class="text-green-500">📍</span>
                        <span class="text-sm text-slate-400 font-bold">${item.room}</span>
                    </div>
                    <div class="p-4 flex flex-col flex-grow">
                        <h3 class="font-bold text-lg mb-2">${item.name}</h3>
                        <p class="text-sm text-slate-400 mb-4 flex-grow">${item.summary}</p>
                        ${item.url ? `<a href="${item.url}" target="_blank" class="text-blue-400 text-sm font-bold hover:underline mb-2">${linkText}</a>` : ''}
                        ${item.name.includes("(203)") ? `<a class="text-blue-400 text-sm font-bold hover:underline" href="https://fesregi.app/customer-order?code=HZH9RZ" target="_blank">メニュー</a>` : ''}
                    </div>
                </div>
                `;
            }).join('');
        }

        document.getElementById("search").addEventListener("input", createCards);
        createCards();
    </script>
</body>
